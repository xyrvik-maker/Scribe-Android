name: Build Scribe APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew 2>/dev/null || true

      - name: Build release APK
        run: gradle app:assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: scribe-release-apk
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: Build debug APK (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: gradle app:assembleDebug --no-daemon

      - name: Upload debug APK
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: scribe-debug-apk
          path: app/build/outputs/apk/debug/app-debug*.apk
          retention-days: 7
